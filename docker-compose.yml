version: "3.8"

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance

  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    ports:
      - "8000:8000"

    depends_on:
      - db

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard

    ports:
      - "8501:8501"

    depends_on:
      - api
